name: Build and Release Firmware

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      source_repo:
        description: "Firmware source repo (owner/name)"
        required: false
        type: string
      pio_env:
        description: "PlatformIO environment name"
        required: false
        type: string
      source_ref:
        description: "Source git ref (tag/branch/sha). Defaults to the pushed tag (or the branch in manual run)."
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      DEFAULT_SOURCE_REPO: ${{ vars.SOURCE_REPO }}
      DEFAULT_PIO_ENV: ${{ vars.PIO_ENV }}
      FALLBACK_PIO_ENV: lolin32
    steps:
      - name: Resolve build settings
        id: cfg
        shell: bash
        run: |
          set -euo pipefail

          SOURCE_REPO="${{ github.event.inputs.source_repo }}"
          if [ -z "$SOURCE_REPO" ]; then
            SOURCE_REPO="$DEFAULT_SOURCE_REPO"
          fi
          if [ -z "$SOURCE_REPO" ]; then
            echo "SOURCE_REPO is not set. Add repo variable SOURCE_REPO in Settings -> Variables and secrets." >&2
            exit 1
          fi

          PIO_ENV="${{ github.event.inputs.pio_env }}"
          if [ -z "$PIO_ENV" ]; then
            PIO_ENV="$DEFAULT_PIO_ENV"
          fi
          if [ -z "$PIO_ENV" ]; then
            PIO_ENV="$FALLBACK_PIO_ENV"
          fi

          SOURCE_REF="${{ github.event.inputs.source_ref }}"
          if [ -z "$SOURCE_REF" ]; then
            SOURCE_REF="${{ github.ref_name }}"
          fi

          {
            echo "source_repo=$SOURCE_REPO"
            echo "pio_env=$PIO_ENV"
            echo "source_ref=$SOURCE_REF"
          } >> "$GITHUB_OUTPUT"

      - name: Clone firmware source
        env:
          SRC: ${{ steps.cfg.outputs.source_repo }}
          REF: ${{ steps.cfg.outputs.source_ref }}
        shell: bash
        run: |
          set -euo pipefail
          TOKEN='${{ secrets.SOURCE_REPO_TOKEN }}'
          if [ -n "$TOKEN" ]; then
            git clone "https://x-access-token:${TOKEN}@github.com/${SRC}.git" source
          else
            git clone "https://github.com/${SRC}.git" source
          fi
          cd source
          git checkout "$REF"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Build firmware
        run: pio run -d source -e "${{ steps.cfg.outputs.pio_env }}"

      - name: Copy firmware artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "source/.pio/build/${{ steps.cfg.outputs.pio_env }}/firmware.bin" "dist/firmware.bin"

      - name: Create or update release
        if: "${{ startsWith(github.ref, 'refs/tags/v') }}"
        uses: softprops/action-gh-release@v2
        with:
          files: dist/firmware.bin
          generate_release_notes: true
          name: "Release ${{ github.ref_name }}"
          body: |
            Firmware build from `${{ steps.cfg.outputs.source_repo }}` @ `${{ steps.cfg.outputs.source_ref }}` (env: `${{ steps.cfg.outputs.pio_env }}`).

      - name: Upload firmware (manual)
        if: "${{ !startsWith(github.ref, 'refs/tags/') && github.event_name == 'workflow_dispatch' }}"
        uses: actions/upload-artifact@v4
        with:
          name: "firmware-${{ steps.cfg.outputs.pio_env }}-${{ steps.cfg.outputs.source_ref }}"
          path: dist/firmware.bin
